<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Madrone's 2026 Thrive Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Hanken+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #F6EBE3;
    --surface:   #FFFFFF;
    --border:    #E6D5C8;
    --border-lt: #EDE0D6;
    --navy:      #2C5670;
    --navy-dk:   #1E3D51;
    --gold:      #B0831F;
    --gold-lt:   #D4A84B;
    --rust:      #BD6440;
    --olive:     #5F6B48;
    --text:      #3A322B;
    --text-mid:  #6D6258;
    --text-lt:   #9C8C7D;
    --muted:     #9C8C7D;
  }

  body {
    font-family: 'Hanken Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── PASSWORD SCREEN ── */
  #pw-screen {
    position: fixed; inset: 0; z-index: 1000;
    background: var(--navy-dk);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 0;
  }
  .pw-inner {
    display: flex; flex-direction: column; align-items: center;
    gap: 32px; width: 320px;
  }
  .pw-top {
    text-align: center;
  }
  .pw-kicker {
    font-size: 10px; font-weight: 500; letter-spacing: 3px;
    text-transform: uppercase; color: var(--gold-lt);
    margin-bottom: 14px;
  }
  #pw-screen h1 {
    font-family: 'Newsreader', serif;
    font-size: 38px; font-weight: 300;
    color: #fff; line-height: 1.15;
    letter-spacing: -0.5px;
  }
  #pw-screen h1 em { font-style: italic; color: var(--gold-lt); }
  #pw-screen p {
    font-size: 12.5px; color: rgba(255,255,255,0.45);
    margin-top: 10px; letter-spacing: 0.3px;
  }
  #pw-form {
    display: flex; flex-direction: column; align-items: stretch; gap: 10px;
    width: 100%;
  }
  #pw-input {
    width: 100%; padding: 13px 16px;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 0;
    background: rgba(255,255,255,0.07);
    font-family: 'Hanken Grotesk', sans-serif;
    font-size: 14px; color: #fff;
    text-align: center; letter-spacing: 2px;
    outline: none; transition: border-color 0.2s;
  }
  #pw-input::placeholder { color: rgba(255,255,255,0.3); letter-spacing: 1px; }
  #pw-input:focus { border-color: var(--gold-lt); }
  #pw-input.error { border-color: var(--rust); animation: shake 0.3s; }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
  }
  #pw-btn {
    width: 100%; padding: 13px;
    background: var(--gold); color: #fff;
    border: none; border-radius: 0;
    font-family: 'Hanken Grotesk', sans-serif;
    font-size: 11px; font-weight: 600;
    letter-spacing: 2.5px; text-transform: uppercase;
    cursor: pointer; transition: background 0.2s;
  }
  #pw-btn:hover { background: var(--gold-lt); }
  #pw-error {
    font-size: 12px; color: #F4A27A;
    min-height: 16px; text-align: center;
  }

  /* ── MAIN APP ── */
  #app { display: none; }

  /* ── SITE HEADER ── */
  .site-header {
    max-width: 860px; margin: 0 auto;
    padding: 64px 32px 0;
  }
  .site-header .kicker {
    font-size: 10px; font-weight: 500; letter-spacing: 3.5px;
    text-transform: uppercase; color: var(--navy);
    margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
  }
  .site-header .kicker::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .site-header h1 {
    font-family: 'Newsreader', serif;
    font-size: clamp(48px, 8vw, 92px);
    font-weight: 300; line-height: 1.0;
    letter-spacing: -2px; color: var(--text);
    margin-bottom: 40px;
  }
  .site-header h1 em { font-style: italic; color: var(--navy); }

  /* INTRO TRIO */
  .intro-trio {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    margin-bottom: 56px;
  }
  .intro-item {
    padding: 24px 0 24px;
    border-right: 1px solid var(--border);
  }
  .intro-item:first-child { padding-right: 28px; }
  .intro-item:nth-child(2) { padding: 24px 28px; }
  .intro-item:last-child { padding-left: 28px; border-right: none; }
  .intro-label {
    font-size: 10px; font-weight: 500; letter-spacing: 2.5px;
    text-transform: uppercase; color: var(--gold);
    margin-bottom: 8px;
  }
  .intro-text {
    font-size: 13px; color: var(--text-mid); line-height: 1.65;
  }

  /* CARDS GRID */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    max-width: 860px; margin: 0 auto;
    padding: 0 32px 80px;
    border-top: 1px solid var(--border);
  }

  .hero-card {
    background: transparent;
    border-right: 1px solid var(--border);
    padding: 28px 24px 28px;
    cursor: pointer;
    transition: background 0.18s;
    position: relative;
  }
  .hero-card:last-child { border-right: none; }
  .hero-card:hover { background: rgba(44,86,112,0.04); }

  .hero-card::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.25s ease;
  }
  .hero-card:hover::after { transform: scaleX(1); }
  .hero-card.relationship::after { background: var(--rust); }
  .hero-card.glow-up::after      { background: var(--gold); }
  .hero-card.nesting::after      { background: var(--olive); }
  .hero-card.fun::after           { background: var(--navy); }

  .card-num {
    font-size: 10px; font-weight: 500; letter-spacing: 1.5px;
    color: var(--text-lt); margin-bottom: 40px;
  }
  .card-emoji { display: none; }
  .card-title {
    font-family: 'Newsreader', serif;
    font-size: 21px; font-weight: 400;
    color: var(--text); margin-bottom: 10px;
    line-height: 1.2;
  }
  .card-desc {
    font-size: 12px; color: var(--text-lt);
    line-height: 1.65; margin-bottom: 28px;
  }
  .card-meta {
    display: flex; align-items: center; gap: 6px;
    font-size: 10px; font-weight: 500;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--navy);
  }
  .card-meta .arrow { font-size: 13px; }
  .card-badge {
    display: inline-block;
    font-size: 9px; font-weight: 500; letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 0;
    margin-bottom: 10px;
  }
  .card-badge.interactive { background: rgba(176,131,31,0.12); color: var(--gold); }
  .card-badge.soon        { background: rgba(95,107,72,0.10); color: var(--olive); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(30,61,81,0.5);
    backdrop-filter: blur(6px);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 20px; overflow-y: auto;
  }
  .modal-box {
    background: var(--surface);
    border-radius: 0;
    max-width: 640px; width: 100%;
    margin: auto; overflow: hidden;
    box-shadow: 0 32px 100px rgba(30,61,81,0.22);
  }
  .modal-header {
    padding: 28px 28px 20px;
    border-bottom: 1px solid var(--border-lt);
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 16px;
    background: var(--navy-dk);
  }
  .modal-header-left { flex: 1; }
  .modal-eyebrow {
    font-size: 9px; font-weight: 500;
    letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--gold-lt); margin-bottom: 6px;
  }
  .modal-title {
    font-family: 'Newsreader', serif;
    font-size: 26px; font-weight: 300;
    color: #fff; line-height: 1.2;
  }
  .modal-close {
    width: 30px; height: 30px;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px; color: rgba(255,255,255,0.6);
    transition: background 0.15s; flex-shrink: 0; margin-top: 2px;
    border-radius: 0;
  }
  .modal-close:hover { background: rgba(255,255,255,0.2); }
  .modal-body {
    padding: 28px 28px 36px;
    max-height: 75vh; overflow-y: auto;
    background: var(--surface);
  }

  /* FOOTER */
  .site-footer {
    text-align: center; padding: 28px;
    font-size: 11px; color: var(--border);
    letter-spacing: 2px; text-transform: uppercase;
    border-top: 1px solid var(--border-lt);
    max-width: 860px; margin: 0 auto;
  }

  /* COMING SOON */
  .coming-soon { text-align: center; padding: 48px 24px; }
  .coming-soon .big-emoji { font-size: 40px; margin-bottom: 16px; }
  .coming-soon h3 {
    font-family: 'Newsreader', serif;
    font-size: 22px; font-weight: 300; color: var(--text); margin-bottom: 8px;
  }
  .coming-soon p { font-size: 13px; color: var(--muted); line-height: 1.6; }

  @media (max-width: 700px) {
    .cards-grid { grid-template-columns: 1fr 1fr; }
    .hero-card { border-bottom: 1px solid var(--border); }
    .hero-card:nth-child(2n) { border-right: none; }
    .site-header { padding: 48px 20px 0; }
    .site-header h1 { font-size: 52px; letter-spacing: -1.5px; }
    .intro-trio { grid-template-columns: 1fr; }
    .intro-item, .intro-item:first-child, .intro-item:nth-child(2), .intro-item:last-child {
      padding: 18px 0; border-right: none;
      border-bottom: 1px solid var(--border);
    }
    .intro-item:last-child { border-bottom: none; }
    .cards-grid { padding: 0 20px 60px; }
  }
  @media (max-width: 420px) {
    .cards-grid { grid-template-columns: 1fr; }
    .hero-card { border-right: none; }
  }
</style>
</head>
<body>

<!-- PASSWORD SCREEN -->
<div id="pw-screen">
  <div class="pw-inner">
    <div class="pw-top">
      <div class="pw-kicker">Private · 2026</div>
      <h1>Madrone's<br/><em>Thrive Guide</em></h1>
      <p>Enter your password to continue.</p>
    </div>
    <form id="pw-form" onsubmit="checkPassword(event)">
      <input id="pw-input" type="password" placeholder="password" autocomplete="current-password" autofocus />
      <button id="pw-btn" type="submit">Enter</button>
      <div id="pw-error"></div>
    </form>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div id="react-root"></div>
</div>

<script>
  const PW = "thrive2026";

  function checkPassword(e) {
    e.preventDefault();
    const val = document.getElementById("pw-input").value;
    if (val === PW) {
      sessionStorage.setItem("thrive_auth", "1");
      unlock();
    } else {
      const inp = document.getElementById("pw-input");
      const err = document.getElementById("pw-error");
      inp.classList.add("error");
      err.textContent = "Incorrect password — try again";
      setTimeout(() => { inp.classList.remove("error"); inp.value = ""; inp.focus(); }, 400);
    }
  }

  function unlock() {
    document.getElementById("pw-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
    if (!window._appMounted) {
      window._appMounted = true;
      // React mounts here — triggered by Babel script below
    }
  }

  if (sessionStorage.getItem("thrive_auth") === "1") unlock();
</script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─────────────────────────────────────────────

function RelationshipTimeline() {

    {

        { tag: "intimacy", text: "Sex happens for the first time. It is new territory together." },
        { tag: "intimacy", text: "You notice how he is with you — present, attentive, not performing" },

        { tag: "self", text: "You notice you are softer, more open — someone mattering to you does that" },

    },
    {

      items: [
        { tag: "core", text: "The conversation happens — what are we, where is this going" },
        { tag: "core", text: "The category uncertainty closes. You can breathe." },
        { tag: "social", text: "You introduce him as your boyfriend. Out loud. To someone." },
        { tag: "social", text: "Your friends start to know him as a real presence in your life, not just someone you are seeing" },
        { tag: "self", text: "You have a partner now. That is part of who you are. It settles something." },
        { tag: "intimacy", text: "Sex carries more meaning now — there is a named context around it" },
      ]
    },
    {
      color: "#854F0B", title: "month 3–5", sub: "knowing each other under pressure",
      items: [
        { tag: "core", text: "He has a hard week. You watch how he carries stress." },
        { tag: "core", text: "You have a hard week. It starts to feel safe to tell him." },
        { tag: "core", text: "He shows up when you need something — not perfectly, but genuinely" },
        { tag: "intimacy", text: "Physical closeness starts to include comfort, not just desire — being held when something is hard" },
        { tag: "self", text: "You notice you are letting someone in in a way you may not have before. That is significant." },

    },
    {
      color: "#639922", title: "month 4–6", sub: "settling into security",
      items: [
        { tag: "core", text: "The body has started to trust the pattern. He keeps showing up." },
        { tag: "core", text: "You stop bracing when he goes quiet. You know what it means now." },
        { tag: "intimacy", text: "Sex has its own rhythm now — it belongs to the two of you specifically" },

  const [checked, setChecked] = useState(() => {
    try { return new Set(JSON.parse(localStorage.getItem("thrive-relationship") || "[]")); }
    catch { return new Set(); }

  const toggle = (key) => {
    setChecked(prev => {

      next.has(key) ? next.delete(key) : next.add(key);

          </div>
          {pi < phases.length - 1 && <div style={{ height:1, background:"#E8DFD4", margin:"20px 0 0" }} />}

      ))}
    </div>
  );
}

      { name:"Myo-inositol", dose:"2g twice daily", timing:"Start at 2g total — increase slowly over 2–4 weeks", note:"Modulates serotonin receptors. Start low. May potentiate sertraline. Allow 4–8 weeks for full effect.", warn:"start low" },
      { name:"Glutamine", dose:"5g three times daily", timing:"On tongue before meals or when cravings hit", note:"Clean — no meaningful interactions with either med.", warn:null },
    ]
  },
  {
    section: "Blood sugar + metabolic",
    items: [
      { name:"Berberine", dose:"500mg once daily to start", timing:"With dinner — increase to twice daily if tolerated", note:"CYP interaction is real but low at your modafinil dose. Start with one dose, monitor for modafinil feeling stronger. Mention to prescriber.", warn:"mention to prescriber" },
    ]
  },
  {
    section: "Foundation",
    items: [
      { name:"Magnesium glycinate", dose:"400mg", timing:"At night before bed", note:"No interactions. Supports cortisol, sleep, and cravings.", warn:null },
      { name:"Zinc", dose:"25mg", timing:"With food — not same time as magnesium", note:"Take copper 1–2mg if using longer than 3 months. Zinc depletes copper over time.", warn:"add copper at 3mo" },
      { name:"B complex", dose:"Standard dose (not mega-dose)", timing:"Morning with food", note:"High-dose B6 has weak serotonin activity — standard dose only.", warn:null },
    ]
  },
];

function SupplementStack() {
  const [checked, setChecked] = useState(() => {
    try { return new Set(JSON.parse(localStorage.getItem("thrive-supps") || "[]")); }
    catch { return new Set(); }
  });

  const toggle = (key) => {
    setChecked(prev => {
      const next = new Set(prev);
      next.has(key) ? next.delete(key) : next.add(key);
      localStorage.setItem("thrive-supps", JSON.stringify([...next]));
      return next;
    });
  };

  return (
    <div>
      {/* IF window card */}
      <div style={{ background:"#F7F0E6", border:"1px solid #E6D5C8", borderRadius:6, padding:"14px 16px", marginBottom:12 }}>
        <div style={{ fontSize:10, fontWeight:600, letterSpacing:"2px", textTransform:"uppercase", color:"#B0831F", marginBottom:8 }}>Intermittent fasting window</div>
        <div style={{ display:"flex", alignItems:"center", gap:0, marginBottom:10 }}>
          <div style={{ flex:1, textAlign:"center", padding:"10px 8px", background:"#1E3D51", borderRadius:"4px 0 0 4px" }}>
            <div style={{ fontSize:11, color:"rgba(255,255,255,0.5)", marginBottom:2 }}>eat from</div>
            <div style={{ fontSize:20, fontFamily:"'Newsreader',serif", fontWeight:300, color:"#D4A84B" }}>10 am</div>
          </div>
          <div style={{ padding:"0 10px", color:"#9C8C7D", fontSize:13 }}>→</div>
          <div style={{ flex:1, textAlign:"center", padding:"10px 8px", background:"#1E3D51", borderRadius:"0 4px 4px 0" }}>
            <div style={{ fontSize:11, color:"rgba(255,255,255,0.5)", marginBottom:2 }}>stop at</div>
            <div style={{ fontSize:20, fontFamily:"'Newsreader',serif", fontWeight:300, color:"#D4A84B" }}>8 pm</div>
          </div>
        </div>
        <div style={{ fontSize:12, color:"#6D6258", lineHeight:1.6 }}>
          10-hour eating window. Fast 16 hours. The food noise supplement stack below is designed to work alongside this window — glutamine on the tongue when cravings hit during fasting hours.
        </div>
      </div>

      {/* Rx note */}
      <div style={{ background:"#EBF3FB", border:"1px solid #A8C4D8", borderRadius:6, padding:"12px 14px", marginBottom:20, fontSize:13, color:"#1E3D51", lineHeight:1.6, display:"flex", gap:10, alignItems:"flex-start" }}>
        <span style={{ fontSize:16, flexShrink:0, marginTop:1 }}>💊</span>
        <span>Rx: sertraline 150mg + modafinil 150–200mg daily. Start new supplements one at a time, one week apart.</span>
      </div>

      {SUPPLEMENTS.map((group) => (
        <div key={group.section} style={{ marginBottom:8 }}>
          <div style={{ fontSize:10, fontWeight:600, letterSpacing:"2px", textTransform:"uppercase", color:"#9C8C7D", margin:"20px 0 4px" }}>{group.section}</div>
          {group.items.map((item, i) => {
            const key = `${group.section}-${i}`;
            const isChecked = checked.has(key);
            return (
              <div key={i} style={{ display:"flex", alignItems:"flex-start", gap:12, padding:"14px 0", borderBottom:"0.5px solid #E6D5C8" }}>
                <div
                  onClick={() => toggle(key)}
                  style={{ width:22, height:22, minWidth:22, borderRadius:6, border: isChecked ? "none" : "1.5px solid #C4A882", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", transition:"all 0.15s", background: isChecked ? "#1D9E75" : "transparent", flexShrink:0, marginTop:1 }}
                >
                  {isChecked && <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M2 5.5L4.5 8L9 3" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:14, fontWeight:500, color:"#3A322B", marginBottom:3, display:"flex", alignItems:"center", flexWrap:"wrap", gap:6 }}>
                    {item.name}
                    {item.warn
                      ? <span style={{ fontSize:10, fontWeight:500, padding:"2px 7px", background:"#FBF0ED", color:"#BD6440", borderRadius:4 }}>{item.warn}</span>
                      : <span style={{ fontSize:10, fontWeight:500, padding:"2px 7px", background:"#EEF2EA", color:"#5F6B48", borderRadius:4 }}>clean</span>
                    }
                  </div>
                  <div style={{ fontSize:12, color:"#6D6258", marginBottom:4 }}>{item.dose} · {item.timing}</div>
                  <div style={{ fontSize:11, color:"#9C8C7D", lineHeight:1.5 }}>{item.note}</div>
                </div>
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

function GlowUpTabs() {
  const [tab, setTab] = useState("wardrobe");
  const tabs = [
    { id:"wardrobe",     label:"Wardrobe & Beauty" },
    { id:"mindset",      label:"Decisional Balance" },
    { id:"supplements",  label:"Supplement Stack" },
  ];
  return (
    <div>
      <div style={{ display:"flex", gap:8, marginBottom:24, borderBottom:"1px solid #E8DFD4", paddingBottom:0 }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            fontFamily:"'DM Sans',sans-serif", fontSize:12, fontWeight:500,
            padding:"8px 14px", border:"none", background:"none", cursor:"pointer",
            color: tab === t.id ? "#3A2E22" : "#8B7B68",
            borderBottom: tab === t.id ? "2px solid #8B6B2F" : "2px solid transparent",
            marginBottom:"-1px", transition:"color 0.15s",
          }}>{t.label}</button>
        ))}
      </div>
      {tab === "wardrobe" ? <GlowUpChecklist /> : tab === "mindset" ? <DecisionalBalance /> : <SupplementStack />}
    </div>
  );
}

function App() {
  const [open, setOpen] = useState(null);
  const overlayRef = useRef(null);

  const card = CARDS.find(c => c.id === open);

  useEffect(() => {
    const handler = (e) => { if (e.key === "Escape") setOpen(null); };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, []);

  useEffect(() => {
    document.body.style.overflow = open ? "hidden" : "";
    return () => { document.body.style.overflow = ""; };
  }, [open]);

  return (
    <>
      <div className="site-header">
        <div className="kicker">The year ahead</div>
        <h1>This year, I come<br/>home to <em>myself.</em></h1>
        <div className="intro-trio">
          <div className="intro-item">
            <div className="intro-label">The idea</div>
            <div className="intro-text">Four pillars, one quiet place to return to all year long.</div>
          </div>
          <div className="intro-item">
            <div className="intro-label">The feeling</div>
            <div className="intro-text">Smart, creative, grounded — warm tones only, gold not silver.</div>
          </div>
          <div className="intro-item">
            <div className="intro-label">The invitation</div>
            <div className="intro-text">Choose a pillar below and step inside.</div>
          </div>
        </div>
      </div>

      <div className="cards-grid">
        {CARDS.map((c, i) => (
          <div
            key={c.id}
            className={`hero-card ${c.className}`}
            onClick={() => setOpen(c.id)}
            role="button"
            tabIndex={0}
            onKeyDown={e => e.key === "Enter" && setOpen(c.id)}
          >
            <div className="card-num">0{i + 1}</div>
            <span className={`card-badge ${c.badge}`}>
              {c.badge === "interactive" ? "Interactive" : "Coming soon"}
            </span>
            <div className="card-title">{c.title}</div>
            <div className="card-desc">{c.desc}</div>
            <div className="card-meta">
              <span>Open</span>
              <span className="arrow">→</span>
            </div>
          </div>
        ))}
      </div>

      <div className="site-footer">Madrone's Thrive Guide &nbsp;·&nbsp; Private &nbsp;·&nbsp; 2026 &nbsp;·&nbsp; made with care</div>

      {open && card && (
        <div
          className="modal-overlay"
          ref={overlayRef}
          onClick={e => { if (e.target === overlayRef.current) setOpen(null); }}
        >
          <div className="modal-box">
            <div className="modal-header">
              <div className="modal-header-left">
                <div className="modal-eyebrow">{card.eyebrow}</div>
                <div className="modal-title">{card.emoji} {card.title}</div>
              </div>
              <button className="modal-close" onClick={() => setOpen(null)} aria-label="Close">✕</button>
            </div>
            <div className="modal-body">
              {card.component ? card.component : (
                <div className="coming-soon">
                  <div className="big-emoji">{card.emoji}</div>
                  <h3>{card.title}</h3>
                  <p>This section is being built.<br/>Check back soon — it'll be worth the wait.</p>
                </div>
              )}
            </div>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("react-root")).render(<App />);
